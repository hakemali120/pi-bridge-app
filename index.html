<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        const Pi = window.Pi;
        Pi.init({ version: "1.9", sandbox: true });
        async function auth() {
            try {
                const user = await Pi.authenticate(['username'], (p) => {});
                document.getElementById('status').innerText = "تم الربط بنجاح يا بطل: " + user.user.username;
            } catch (e) { document.getElementById('status').innerText = "خطأ: " + e.message; }
        }
    </script>
</head>
<body style="background: #000; color: #fff; text-align: center; padding: 50px;">
    <h1>GCV Bridge Test</h1>
    <div id="status">جاري محاولة الاتصال بالبلوكشين...</div>
    <button onclick="auth()" style="padding: 10px 20px; margin-top: 20px;">اضغط هنا للتوثيق اليدوي</button>
</body>
</html>
