<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCV Bridge | جسر العملات</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 400px; margin: auto; }
        .btn { background: #fae100; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .status { color: #00ff00; margin-top: 10px; font-size: 0.9em; }
        h2 { color: #fae100; }
    </style>
</head>
<body>

    <div class="card">
        <h2>جسر GCV الاستراتيجي</h2>
        <p>رصيدك الحالي في التعدين:</p>
        <h3 id="user-balance">جاري التحميل...</h3>
        <hr>
        <p id="user-name">مرحباً بك في لوحة المطور</p>
        <div id="auth-status" class="status">في انتظار التوثيق...</div>
        <button class="btn" onclick="startPayment()">تجربة تحويل اختبارية (GCV)</button>
    </div>

    <script>
        // 1. تهيئة التطبيق لوضع الساند بوكس (حل مشكلة التحميل)
        const Pi = window.Pi;
        Pi.init({ version: "1.9", sandbox: true });

        async function authenticateUser() {
            try {
                const scopes = ['username', 'payments'];
                
                // دالة معالجة المدفوعات غير المكتملة
                const onIncompletePaymentFound = (payment) => {
                    console.log("يوجد دفع معلق:", payment);
                };

                // 2. طلب التوثيق من الشبكة
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                document.getElementById('user-name').innerText = "مرحباً: " + user.user.username;
                document.getElementById('auth-status').innerText = "تم الاتصال بنجاح بالبلوكشين ?";
                document.getElementById('user-balance').innerText = "14,823 Pi"; // رصيدك الذي حددناه سابقاً
                
            } catch (err) {
                document.getElementById('auth-status').innerText = "خطأ في التوثيق: " + err.message;
                document.getElementById('auth-status').style.color = "red";
            }
        }

        // تشغيل التوثيق فور فتح التطبيق
        authenticateUser();

        function startPayment() {
            alert("سيتم تفعيل بوابة الدفع بسعر 314,159$ (GCV) فور استكمال الربط النهائي!");
        }
    </script>
</body>
</html>
